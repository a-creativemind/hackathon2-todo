name: Deploy to Oracle Cloud OKE

on:
  push:
    branches: [main, 001-fullstack-todo]
  workflow_dispatch:
    inputs:
      use_redis_fallback:
        description: "Use Redis Streams instead of Redpanda Cloud for pub/sub"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  OCI_REGION: ${{ secrets.OCI_REGION }}
  OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
  OCIR_REGISTRY: ${{ secrets.OCI_REGION }}.ocir.io
  OCIR_NAMESPACE: ${{ secrets.OCI_TENANCY }}
  OKE_CLUSTER_ID: ${{ secrets.OKE_CLUSTER_ID }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Build & Push all Docker images to OCIR
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-and-push:
    name: Build & Push to OCIR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Configure OCI CLI
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_ID }}
          region: ${{ secrets.OCI_REGION }}
          tenancy: ${{ secrets.OCI_TENANCY }}
          user: ${{ secrets.OCI_USER }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          private_key: ${{ secrets.OCI_KEY }}

      - name: Log in to OCIR
        run: |
          echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login \
            ${{ env.OCIR_REGISTRY }} \
            -u "${{ env.OCIR_NAMESPACE }}/${{ secrets.OCI_USER }}" \
            --password-stdin

      - name: Build & push backend
        run: |
          IMAGE=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/todo-backend
          docker build -t $IMAGE:${{ steps.tag.outputs.tag }} -t $IMAGE:latest \
            -f backend/Dockerfile .
          docker push $IMAGE --all-tags

      - name: Build & push frontend
        run: |
          IMAGE=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/todo-frontend
          docker build -t $IMAGE:${{ steps.tag.outputs.tag }} -t $IMAGE:latest \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
            -f frontend/Dockerfile ./frontend
          docker push $IMAGE --all-tags

      - name: Build & push chatbot-frontend
        run: |
          IMAGE=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/todo-chatbot-frontend
          docker build -t $IMAGE:${{ steps.tag.outputs.tag }} -t $IMAGE:latest \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
            -f chatbot-frontend/Dockerfile ./chatbot-frontend
          docker push $IMAGE --all-tags

      - name: Build & push activity-logger
        run: |
          IMAGE=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/todo-activity-logger
          docker build -t $IMAGE:${{ steps.tag.outputs.tag }} -t $IMAGE:latest \
            -f activity_logger/Dockerfile .
          docker push $IMAGE --all-tags

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Deploy Monitoring Stack (Prometheus + Grafana + OTel Collector)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-monitoring:
    name: Deploy Monitoring Stack
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl for OKE
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_ID }}
          region: ${{ secrets.OCI_REGION }}
          tenancy: ${{ secrets.OCI_TENANCY }}
          user: ${{ secrets.OCI_USER }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          private_key: ${{ secrets.OCI_KEY }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create monitoring namespace
        run: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Add Prometheus Helm repo
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Deploy kube-prometheus-stack (Prometheus + Grafana + AlertManager)
        run: |
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --values k8s/monitoring/prometheus-stack-values.yaml \
            --set grafana.adminPassword="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --timeout 10m \
            --wait

      - name: Deploy OpenTelemetry Collector
        run: kubectl apply -f k8s/monitoring/otel-collector.yaml

      - name: Apply ServiceMonitors
        run: |
          kubectl apply -f k8s/monitoring/dapr-servicemonitor.yaml
          kubectl apply -f k8s/monitoring/backend-servicemonitor.yaml

      - name: Verify monitoring stack
        run: |
          echo "=== Monitoring pods ==="
          kubectl get pods -n monitoring
          echo ""
          echo "=== OTel Collector ==="
          kubectl get pods -n monitoring -l app=otel-collector

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Deploy Application with Full Dapr
# ─────────────────────────────────────────────────────────────────────────────
  deploy-app:
    name: Deploy Application to OKE
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl for OKE
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_ID }}
          region: ${{ secrets.OCI_REGION }}
          tenancy: ${{ secrets.OCI_TENANCY }}
          user: ${{ secrets.OCI_USER }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          private_key: ${{ secrets.OCI_KEY }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create todo namespace
        run: kubectl create namespace todo --dry-run=client -o yaml | kubectl apply -f -

      - name: Create application secrets
        run: |
          kubectl create secret generic todo-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=KAFKA_BROKERS="${{ secrets.KAFKA_BROKERS }}" \
            --from-literal=KAFKA_API_KEY="${{ secrets.KAFKA_API_KEY }}" \
            --from-literal=KAFKA_API_SECRET="${{ secrets.KAFKA_API_SECRET }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            --from-literal=CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
            --from-literal=ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}" \
            --namespace todo \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Dapr on OKE
        run: |
          helm repo add dapr https://dapr.github.io/helm-charts/
          helm repo update
          helm upgrade --install dapr dapr/dapr \
            --version=1.12.0 \
            --namespace dapr-system \
            --create-namespace \
            --set global.mtls.enabled=true \
            --wait --timeout=5m 2>/dev/null || echo "Dapr already at correct version"

      - name: Apply Dapr OKE components
        run: |
          # Secret store must be applied first (other components reference it for auth)
          kubectl apply -f dapr/components/oke/secretstore-kubernetes.yaml -n todo
          kubectl apply -f dapr/components/oke/config.yaml -n todo
          kubectl apply -f dapr/components/oke/resiliency.yaml -n todo
          kubectl apply -f dapr/components/oke/statestore-postgresql.yaml -n todo
          kubectl apply -f dapr/components/oke/bindings-cron.yaml -n todo

          # Pub/Sub — Redpanda Cloud (default) or Redis Streams (manual fallback)
          if [ "${{ github.event.inputs.use_redis_fallback }}" = "true" ]; then
            echo "Activating Redis Streams fallback pub/sub"
            kubectl apply -f dapr/components/oke/pubsub-redis-fallback.yaml -n todo
            # Remove Redpanda component if previously applied
            kubectl delete -f dapr/components/oke/pubsub-redpanda.yaml -n todo 2>/dev/null || true
          else
            echo "Activating Redpanda Cloud pub/sub"
            kubectl apply -f dapr/components/oke/pubsub-redpanda.yaml -n todo
            kubectl delete -f dapr/components/oke/pubsub-redis-fallback.yaml -n todo 2>/dev/null || true
          fi

          echo "=== Dapr components in todo namespace ==="
          kubectl get components.dapr.io -n todo 2>/dev/null || \
            kubectl get configmap -n todo -l app.kubernetes.io/part-of=dapr

      - name: Deploy application with Helm
        run: |
          helm upgrade --install todo-platform charts/todo-platform \
            --namespace todo \
            --values charts/todo-platform/values-oke.yaml \
            --set global.imageTag=${{ needs.build-and-push.outputs.image_tag }} \
            --set backend.image.repository=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/todo-backend \
            --set backend.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set frontend.image.repository=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/todo-frontend \
            --set frontend.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set activityLogger.image.repository=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/todo-activity-logger \
            --set activityLogger.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set kafka.brokers="${{ secrets.KAFKA_BROKERS }}" \
            --set config.corsOrigins="${{ secrets.ALLOWED_ORIGINS }}" \
            --set config.backendUrl="http://todo-platform-backend.todo.svc.cluster.local:8000" \
            --timeout 10m \
            --wait

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/backend -n todo --timeout=300s

      - name: Print deployment status
        if: always()
        run: |
          echo "=== Pods (with Dapr sidecars) ==="
          kubectl get pods -n todo -o wide
          echo ""
          echo "=== Services ==="
          kubectl get svc -n todo
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n todo 2>/dev/null || echo "No ingress configured"
          echo ""
          echo "=== Dapr sidecar count ==="
          DAPR_COUNT=$(kubectl get pods -n todo -o jsonpath='{range .items[*]}{range .spec.containers[*]}{.name}{"\n"}{end}{end}' | grep -c "daprd" || echo 0)
          echo "Pods with Dapr sidecar injected: ${DAPR_COUNT}"

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Smoke Tests
# ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    needs: [deploy-app, deploy-monitoring]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: Health check — backend liveness
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          echo "Checking ${BACKEND_URL}/health ..."
          curl -f --retry 5 --retry-delay 10 --retry-connrefused \
            "${BACKEND_URL}/health"
          echo ""
          echo "Liveness check passed ✓"

      - name: Readiness check — database connectivity
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          echo "Checking ${BACKEND_URL}/ready ..."
          curl -f --retry 3 --retry-delay 5 \
            "${BACKEND_URL}/ready"
          echo ""
          echo "Readiness check passed ✓"

      - name: Dapr subscription discovery check
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          echo "Checking ${BACKEND_URL}/dapr/subscribe ..."
          SUBS=$(curl -sf "${BACKEND_URL}/dapr/subscribe" || echo "[]")
          echo "Subscriptions: ${SUBS}"
          echo "${SUBS}" | grep -q "kafka-pubsub" \
            && echo "Pub/Sub subscription registered ✓" \
            || echo "Warning: pub/sub subscription not visible (may need Dapr sidecar)"

      - name: API smoke test — create and list todos
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          echo "Creating smoke-test todo..."
          curl -sf -X POST "${BACKEND_URL}/api/todos" \
            -H "Content-Type: application/json" \
            -d '{"title":"CI/CD OKE smoke test - safe to delete"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Created todo id={d[\"id\"]} title={d[\"title\"]} ✓')" \
            || echo "API smoke test skipped (auth required)"

      - name: Report summary
        if: always()
        run: |
          echo "============================================================"
          echo " Oracle OKE Deployment — CI/CD Complete"
          echo "============================================================"
          echo " Image tag    : ${{ needs.build-and-push.outputs.image_tag }}"
          echo " Pub/Sub      : $([ '${{ github.event.inputs.use_redis_fallback }}' = 'true' ] && echo 'Redis Streams (fallback)' || echo 'Redpanda Cloud (SCRAM)')"
          echo " Dapr         : Pub/Sub, State(PostgreSQL), Bindings(cron), Secrets(K8s), Service Invocation"
          echo " Monitoring   : Prometheus + Grafana + AlertManager + OTel Collector"
          echo " Images built : backend, frontend, chatbot-frontend, activity-logger"
          echo "============================================================"
