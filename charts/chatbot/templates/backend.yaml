{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: chatbot-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  database-url: {{ .Values.database.url | default "postgresql+asyncpg://user:password@postgres:5432/chatbot" | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | default "" | quote }}
  clerk-secret-key: {{ .Values.secrets.clerkSecretKey | default "" | quote }}
  clerk-domain: {{ .Values.secrets.clerkDomain | default "" | quote }}
  clerk-publishable-key: {{ .Values.secrets.clerkPublishableKey | default "" | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatbot-config
  namespace: {{ .Values.namespace }}
data:
  app-env: {{ .Values.backend.env.appEnv | quote }}
  log-level: {{ .Values.backend.env.logLevel | quote }}
  api-url: {{ .Values.frontend.env.apiUrl | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.backend.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.service.port }}
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: chatbot-secrets
              key: database-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: chatbot-secrets
              key: openai-api-key
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: app-env
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: log-level
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: chatbot-secrets
              key: clerk-secret-key
        - name: CLERK_DOMAIN
          valueFrom:
            secretKeyRef:
              name: chatbot-secrets
              key: clerk-domain
        resources:
          requests:
            memory: {{ .Values.backend.resources.requests.memory }}
            cpu: {{ .Values.backend.resources.requests.cpu }}
          limits:
            memory: {{ .Values.backend.resources.limits.memory }}
            cpu: {{ .Values.backend.resources.limits.cpu }}
        livenessProbe:
          httpGet:
            path: {{ .Values.backend.healthCheck.path }}
            port: {{ .Values.backend.service.port }}
          initialDelaySeconds: {{ .Values.backend.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.healthCheck.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.backend.healthCheck.path }}
            port: {{ .Values.backend.service.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.backend.name }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.port }}
  type: {{ .Values.backend.service.type }}
{{- end }}
