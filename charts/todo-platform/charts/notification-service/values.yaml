replicaCount: 1
image:
  repository: todo-notification-service
  tag: ""
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8082
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
healthCheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
dapr:
  enabled: true
  appId: "notification-service"
  appPort: "8082"
  logLevel: "info"
  sidecar:
    cpuLimit: "200m"
    memoryLimit: "128Mi"
global:
  imageTag: latest
  imagePullPolicy: IfNotPresent
