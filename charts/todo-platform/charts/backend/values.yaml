# Backend subchart values
# These are defaults that can be overridden by parent chart

replicaCount: 1

image:
  repository: todo-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

healthCheck:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

# Dapr sidecar configuration
dapr:
  enabled: true
  logLevel: info
  sidecar:
    cpuLimit: 300m
    memoryLimit: 256Mi
