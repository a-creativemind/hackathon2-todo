# Frontend subchart values
# These are defaults that can be overridden by parent chart

replicaCount: 1

image:
  repository: todo-frontend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

healthCheck:
  path: /
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

env:
  apiUrl: "http://backend:8000"

# Dapr configuration
dapr:
  enabled: true
  logLevel: "info"
  sidecar:
    cpuLimit: "300m"
    memoryLimit: "256Mi"
