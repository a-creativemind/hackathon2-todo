{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: mcp
  labels:
    app: mcp
    app.kubernetes.io/name: mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
