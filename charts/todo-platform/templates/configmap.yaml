apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: todo-platform
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | default "INFO" | quote }}
  ALLOWED_ORIGINS: {{ .Values.config.corsOrigins | default "http://localhost:3000,http://localhost:3001" | quote }}
  BACKEND_URL: {{ .Values.config.backendUrl | default "http://backend:8000" | quote }}
