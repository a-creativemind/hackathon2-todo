apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: todo-platform
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | default "" | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "" | quote }}
