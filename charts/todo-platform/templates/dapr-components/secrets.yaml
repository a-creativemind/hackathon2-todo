{{- if .Values.dapr.secrets.enabled }}
{{- if eq (.Values.dapr.secrets.type | default "kubernetes") "kubernetes" }}
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: {{ .Values.dapr.secrets.name | default "todo-kubernetes-secrets" }}
  namespace: {{ .Release.Namespace }}
spec:
  type: secretstores.kubernetes
  version: v1
  metadata:
    - name: ""
      value: ""
  {{- if .Values.dapr.secrets.scopes }}
  scopes:
  {{- range .Values.dapr.secrets.scopes }}
    - {{ . }}
  {{- end }}
  {{- else }}
  scopes:
    - todo-backend
    - activity-logger
    - mcp-server
  {{- end }}
{{- else if eq .Values.dapr.secrets.type "local" }}
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: {{ .Values.dapr.secrets.name | default "todo-local-secrets" }}
  namespace: {{ .Release.Namespace }}
spec:
  type: secretstores.local.file
  version: v1
  metadata:
    - name: secretsFile
      value: {{ .Values.dapr.secrets.local.filePath | default "/components/secrets.json" }}
    - name: nestedSeparator
      value: ":"
  {{- if .Values.dapr.secrets.scopes }}
  scopes:
  {{- range .Values.dapr.secrets.scopes }}
    - {{ . }}
  {{- end }}
  {{- else }}
  scopes:
    - todo-backend
    - activity-logger
    - mcp-server
  {{- end }}
{{- end }}
{{- end }}
